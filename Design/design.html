<style>
        body {
            background-color: #f8f5f1;
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
            color: #433e3a;
            overflow-x: hidden;
            font-family: 'Crimson Pro', serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
            font-size: 22px;
        }
        .bento-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(138, 129, 122, 0.2);
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bento-card:hover {
            transform: translateY(-4px);
            box-shadow: 0px 10px 30px rgba(67, 62, 58, 0.08);
            border-color: rgba(177, 98, 77, 0.3);
        }
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Crimson Pro', serif;
            font-weight: 700;
        }
        .floating-dock {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(138, 129, 122, 0.2);
        }
        /* Illustrative styling for buttons */
        .illustrative-icon {
            font-variation-settings: 'FILL' 0, 'wght' 200;
            color: #6b8a7a;
        }
    </style>
</head>
<body class="font-body-md text-on-background bg-background min-h-screen">
<!-- Top Navigation Bar (Simplified/Zen) -->
<header class="fixed top-0 left-0 w-full h-20 flex justify-between items-center px-10 z-40 transition-colors duration-300">
<div class="flex items-center gap-6">
<span class="font-headline-md text-headline-md font-bold text-primary italic tracking-tight">ApKiRota</span>
<div class="hidden md:flex items-center bg-surface-container/50 backdrop-blur-sm px-4 py-1.5 rounded-full text-sm font-medium border border-outline-variant/30">
<button class="bg-surface-container-lowest text-primary px-4 py-1 rounded-full shadow-sm font-bold transition-all">Normal</button>
<span class="mx-3 text-outline-variant">|</span>
<button class="text-on-surface-variant hover:text-primary transition-colors">Unlimited</button>
</div>
</div>
<div class="flex items-center gap-4"><button class="w-10 h-10 flex items-center justify-center hover:bg-surface-container rounded-full text-on-surface-variant transition-colors">
<span class="material-symbols-outlined">light_mode</span>
</button>
<div class="flex items-center gap-1 ml-2">
<button class="w-8 h-8 flex items-center justify-center hover:bg-surface-container rounded-md text-on-surface-variant transition-colors">
<span class="material-symbols-outlined text-[18px]">minimize</span>
</button>
<button class="w-8 h-8 flex items-center justify-center hover:bg-surface-container rounded-md text-on-surface-variant transition-colors">
<span class="material-symbols-outlined text-[18px]">check_box_outline_blank</span>
</button>
<button class="w-8 h-8 flex items-center justify-center hover:bg-error/10 hover:text-error rounded-md text-on-surface-variant transition-colors">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div></div>
</header>
<!-- Main Content Canvas (Zen/Centered) -->
<main class="w-full pt-20 pb-32 min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<div class="w-full max-w-4xl px-gutter relative z-10 fade-in">
<!-- Central Greeting -->
<div class="text-center mb-12 flex flex-col items-center gap-6">
<div class="text-primary opacity-80">
<span class="material-symbols-outlined text-7xl illustrative-icon" style="font-variation-settings: 'wght' 100;">spa</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-on-surface tracking-tight leading-tight">
                Hello, <span class="italic font-light text-tertiary">night owl</span>
</h1>
</div>
<!-- Main Input Area (Wider and more prominent) -->
<div class="bg-surface-container-lowest/90 backdrop-blur-md border border-outline-variant/30 rounded-[3rem] p-10 shadow-xl shadow-primary/5 focus-within:shadow-2xl focus-within:border-primary/30 transition-all duration-700">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-body-lg font-body-lg text-on-surface placeholder:text-outline-variant/50 resize-none h-40 italic leading-relaxed" placeholder="How can I help you today?"></textarea>
<div class="flex items-center justify-between mt-8">
<div class="flex items-center gap-3">
<button class="w-12 h-12 flex items-center justify-center hover:bg-surface-container rounded-full text-on-surface-variant transition-colors border border-outline-variant/20">
<span class="material-symbols-outlined illustrative-icon">add</span>
</button>
</div>
<div class="flex items-center gap-6">
<div class="flex items-center gap-3 px-6 py-2.5 bg-surface-container/60 rounded-full cursor-pointer hover:bg-surface-container-high transition-colors border border-outline-variant/20">
<span class="text-[15px] font-medium text-on-surface-variant">Gemini 3.5 Flash Lite</span>
<span class="material-symbols-outlined text-sm illustrative-icon">expand_more</span>
</div>
<div class="flex items-center gap-4">
<button class="w-12 h-12 flex items-center justify-center hover:bg-surface-container rounded-full text-on-surface-variant transition-colors border border-outline-variant/20">

</div>
</div>
</div>

<button class="px-7 py-3 bento-card flex items-center gap-3 hover:bg-white transition-all active:scale-95 group">
<span class="material-symbols-outlined text-tertiary text-2xl illustrative-icon group-hover:scale-110 transition-transform">code_blocks</span>
<span class="font-label-md text-label-md text-on-surface">Code</span>
</button>
<button class="px-7 py-3 bento-card flex items-center gap-3 hover:bg-white transition-all active:scale-95 group">
<span class="material-symbols-outlined text-tertiary text-2xl illustrative-icon group-hover:scale-110 transition-transform">coffee</span>
<span class="font-label-md text-label-md text-on-surface">Life stuff</span>
</button>
<button class="px-7 py-3 bento-card flex items-center gap-3 hover:bg-white transition-all active:scale-95 group">
<span class="material-symbols-outlined text-tertiary text-2xl illustrative-icon group-hover:scale-110 transition-transform">lightbulb</span>
<span class="font-label-md text-label-md text-on-surface">News Today</span>
</button>
</div>
</div>
</main>
<!-- Floating Bottom Dock (Replacing Sidebar) -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-2 p-2 floating-dock rounded-2xl shadow-2xl z-50">
<div class="flex items-center gap-1">
<a class="w-14 h-14 flex flex-col items-center justify-center rounded-xl bg-primary/10 text-primary font-bold transition-all" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">chat</span>
<span class="text-[10px] uppercase tracking-tighter mt-0.5">Chat</span>
</a>
<a class="w-14 h-14 flex flex-col items-center justify-center rounded-xl hover:bg-surface-container transition-colors group" href="#">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">add</span>
<span class="text-[10px] uppercase tracking-tighter mt-0.5 text-on-surface-variant">New</span>
</a>
<a class="w-14 h-14 flex flex-col items-center justify-center rounded-xl hover:bg-surface-container transition-colors group" href="#">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">folder</span>
<span class="text-[10px] uppercase tracking-tighter mt-0.5 text-on-surface-variant">Docs</span>
</a>
<a class="w-14 h-14 flex flex-col items-center justify-center rounded-xl hover:bg-surface-container transition-colors group" href="#">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">deployed_code</span>
<span class="text-[10px] uppercase tracking-tighter mt-0.5 text-on-surface-variant">Apps</span>
</a>
</div>
<div class="w-px h-8 bg-outline-variant/30 mx-2"></div>
<div class="flex items-center gap-2 pr-2">
<div class="w-10 h-10 rounded-full bg-tertiary-fixed text-on-tertiary-fixed flex items-center justify-center font-bold text-xs shadow-inner">S</div>
<button class="w-10 h-10 flex items-center justify-center hover:bg-surface-container rounded-full text-on-surface-variant transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</nav>
<!-- Micro-interaction Script -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const textarea = document.querySelector('textarea');
        
        textarea.addEventListener('focus', () => {
            textarea.parentElement.classList.add('ring-4', 'ring-primary/10');
        });

        textarea.addEventListener('blur', () => {
            textarea.parentElement.classList.remove('ring-4', 'ring-primary/10');
        });

        // Smooth fade-in for elements
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('fade-in');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.bento-card, .fade-in').forEach(el => observer.observe(el));
    });
</script>
</body></html>
